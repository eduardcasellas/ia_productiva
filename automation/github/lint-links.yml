name: Lint Links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lychee
        run: sudo apt-get update && sudo apt-get install -y lychee
      - name: Check internal links
        run: lychee --no-progress --exclude 'https?://' '**/*.md' || true
